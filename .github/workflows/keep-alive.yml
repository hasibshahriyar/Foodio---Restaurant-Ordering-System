name: Keep Render Backend Alive

on:
  schedule:
    # Runs every 14 minutes — prevents Render free tier from sleeping (sleeps after 15 min idle)
    - cron: '*/14 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render backend health endpoint
        run: |
          echo "Pinging backend at $(date)"
          BACKEND_URL="${{ secrets.RENDER_BACKEND_URL }}"
          
          if [ -z "$BACKEND_URL" ]; then
            echo "❌ Error: RENDER_BACKEND_URL secret is not set!"
            exit 1
          fi
          
          echo "Using backend URL: $BACKEND_URL"
          
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BACKEND_URL/health" --max-time 30 --connect-timeout 10)
          EXIT_CODE=$?
          
          echo "Response status: $STATUS"
          echo "Curl exit code: $EXIT_CODE"
          
          if [ $EXIT_CODE -ne 0 ]; then
            echo "❌ Curl failed with exit code $EXIT_CODE"
            exit 1
          elif [ "$STATUS" != "200" ]; then
            echo "⚠️  Warning: backend returned status $STATUS"
          else
            echo "✓ Backend is alive ✓"
          fi
